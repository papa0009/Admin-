<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Web3 Platform</title>
    <!-- Ethers.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #10b981; /* Emerald Green for Admin */
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); color: var(--text);
        }
        /* Login Screen */
        #login-section {
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background-color: var(--panel); padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 400px;
        }
        /* Dashboard Layout */
        #dashboard-section { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); padding: 15px 30px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .admin-badge { background: #059669; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0 0; font-size: 1.8rem; font-weight: bold; color: var(--primary); }

        /* Users Table */
        .table-container { background: var(--panel); border-radius: 12px; padding: 20px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); }
        th { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        
        /* Buttons */
        button {
            background-color: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        button:hover { background-color: #059669; }
        .action-btn { background-color: #3b82f6; padding: 8px 15px; font-size: 0.9rem; }
        .action-btn:hover { background-color: #2563eb; }
        .logout-btn { background-color: #ef4444; }
        .logout-btn:hover { background-color: #dc2626; }
        
        .status-msg { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-section">
        <div class="login-box">
            <h1>Admin Portal</h1>
            <p>Connect authorized admin wallet to access.</p>
            <button id="connect-btn">Connect Admin Wallet</button>
            <div id="login-error" style="color: #ef4444; margin-top: 15px;"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard-section">
        <header>
            <div>
                <h2>Admin Control Panel <span class="admin-badge">ADMIN</span></h2>
                <div style="font-size: 0.9rem; color: #94a3b8;">Connected: <span id="admin-address"></span></div>
            </div>
            <button id="logout-btn" class="logout-btn">Disconnect</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Admin USDT Balance (BSC)</h3>
                <p id="admin-usdt">0.00 USDT</p>
            </div>
            <div class="stat-card">
                <h3>Total Registered Users</h3>
                <p id="total-users">0</p>
            </div>
        </div>

        <div class="table-container">
            <h3>Registered Users (Firebase Data)</h3>
            <table>
                <thead>
                    <tr>
                        <th>User Wallet Address</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr><td colspan="4" style="text-align: center;">Loading users from Firebase...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="admin-status" class="status-msg" style="color: #f3ba2f; text-align: center; margin-top: 20px;"></div>
    </div>

    <!-- Firebase Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // IMPORTANT: Use your actual Firebase Config here
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            databaseURL: "https://fortune-2cb70-default-rtdb.asia-southeast1.firebasedatabase.app/",
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- CONFIGURATION ---
        // Yahan par strictly apna Admin Wallet Address dalein (Lowercase mein)
        const ALLOWED_ADMIN_ADDRESS = "0xyouradminwalletaddresshere".toLowerCase(); 
        const USDT_CONTRACT_ADDRESS = "0x55d398326f99059fF775485246999027B3197955"; // BSC Mainnet USDT
        const BSC_CHAIN_ID = '0x38';

        const minABI = [
            "function balanceOf(address owner) view returns (uint256)",
            "function transfer(address to, uint amount) returns (bool)",
            "function decimals() view returns (uint8)"
        ];

        let adminAddress = null;
        let provider, signer, usdtContract;

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const connectBtn = document.getElementById('connect-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginError = document.getElementById('login-error');
        const adminStatus = document.getElementById('admin-status');

        // 1. PERSISTENCE: Check if wallet is already connected on page load
        window.addEventListener('load', async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        checkAndLoginAdmin(accounts[0]);
                    }
                } catch (error) {
                    console.error("Persistence check failed:", error);
                }
            }
        });

        // 2. Connect Wallet Button
        connectBtn.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    await checkAndLoginAdmin(accounts[0]);
                } catch (error) {
                    loginError.innerText = "Connection rejected.";
                }
            } else {
                loginError.innerText = "Please install MetaMask!";
            }
        });

        // 3. Verify Admin and Load Dashboard
        async function checkAndLoginAdmin(address) {
            // Security Check: Make sure only the allowed admin can access this page
            if (address.toLowerCase() !== ALLOWED_ADMIN_ADDRESS) {
                loginError.innerText = `Access Denied! Connected wallet (${address.substring(0,6)}...) is not the admin.`;
                return;
            }

            adminAddress = address;
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            document.getElementById('admin-address').innerText = address;

            // Setup Ethers and Network
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            usdtContract = new ethers.Contract(USDT_CONTRACT_ADDRESS, minABI, signer);

            // Ensure we are on BSC Network
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_CHAIN_ID }],
                });
            } catch (e) {
                console.log("Please switch to Binance Smart Chain manually.");
            }

            updateAdminBalance();
            fetchUsersFromFirebase();

            // Handle account change (if admin changes wallet in MetaMask)
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0 || accounts[0].toLowerCase() !== ALLOWED_ADMIN_ADDRESS) {
                    handleLogout();
                }
            });
        }

        // 4. Update Admin Balance
        async function updateAdminBalance() {
            try {
                const balance = await usdtContract.balanceOf(adminAddress);
                const decimals = await usdtContract.decimals();
                document.getElementById('admin-usdt').innerText = `${parseFloat(ethers.formatUnits(balance, decimals)).toFixed(2)} USDT`;
            } catch (error) {
                console.error("Error fetching balance:", error);
            }
        }

        // 5. Fetch Users from Firebase Realtime Database
        function fetchUsersFromFirebase() {
            const usersRef = ref(database, 'users');
            
            // Listen for real-time updates
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = ''; // Clear table

                if (!data) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No users found.</td></tr>';
                    document.getElementById('total-users').innerText = '0';
                    return;
                }

                const userWallets = Object.keys(data);
                document.getElementById('total-users').innerText = userWallets.length;

                userWallets.forEach(wallet => {
                    const user = data[wallet];
                    const tr = document.createElement('tr');
                    
                    // Format Date
                    const dateObj = new Date(user.lastLogin || Date.now());
                    const dateStr = dateObj.toLocaleDateString() + " " + dateObj.toLocaleTimeString();

                    tr.innerHTML = `
                        <td style="font-family: monospace;">${wallet}</td>
                        <td><span style="color: #10b981;">${user.status || 'Active'}</span></td>
                        <td>${dateStr}</td>
                        <td>
                            <button class="action-btn" data-wallet="${wallet}">Send 5 USDT</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Attach Event Listeners to Payout Buttons
                document.querySelectorAll('.action-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const targetWallet = e.target.getAttribute('data-wallet');
                        sendPayout(targetWallet, "5"); // Send 5 USDT example
                    });
                });
            });
        }

        // 6. Manual Payout Function (Admin sends USDT to User)
        // NOTE: This will open MetaMask for the Admin to confirm the transaction.
        async function sendPayout(userWallet, amount) {
            try {
                adminStatus.style.color = "#f3ba2f";
                adminStatus.innerText = `Please confirm MetaMask transaction to send ${amount} USDT to ${userWallet.substring(0,6)}...`;
                
                const amountToSend = ethers.parseUnits(amount, 18); // 18 decimals for BSC USDT
                
                // Execute BEP-20 Transfer
                const tx = await usdtContract.transfer(userWallet, amountToSend);
                
                adminStatus.innerText = `Transaction pending... Hash: ${tx.hash}`;
                
                await tx.wait(); // Wait for blockchain confirmation
                
                adminStatus.style.color = "#10b981";
                adminStatus.innerText = `Successfully sent ${amount} USDT to ${userWallet}`;
                updateAdminBalance(); // Update admin balance after sending
                
            } catch (error) {
                console.error(error);
                adminStatus.style.color = "#ef4444";
                adminStatus.innerText = "Transaction failed or cancelled.";
            }
        }

        // 7. Logout
        function handleLogout() {
            adminAddress = null;
            loginSection.style.display = 'flex';
            dashboardSection.style.display = 'none';
            loginError.innerText = "";
            adminStatus.innerText = "";
        }

        logoutBtn.addEventListener('click', handleLogout);
    </script>
</body>
</html>
